name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm check-bundle

  backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # main.go's //go:embed all:frontend/dist requires the built bundle to
      # exist before go vet/test/build (they compile the embed directive).
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm build
        working-directory: frontend

      - name: gofmt
        shell: pwsh
        run: |
          $files = gofmt -l .
          if ($files) {
            Write-Host "The following files are not gofmt-formatted:"
            Write-Host $files
            exit 1
          }

      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...

  backend-linux:
    runs-on: ubuntu-latest
    container: ubuntu:22.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      # Only shipping platform whose !windows Go code (server_linux.go,
      # server_unix.go, server_other.go) isn't otherwise compiled anywhere in
      # CI — the windows-latest backend job above never touches those files.
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git ca-certificates curl build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev
          # The workspace is bind-mounted from the host and owned by a
          # different uid than this container's root, so git refuses to touch
          # it — which breaks go build's VCS stamping (exit 128).
          # actions/checkout sets this too, but only in a temporary global
          # config that doesn't survive its own step.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm build
        working-directory: frontend

      - run: go vet ./...
      - run: go test ./...
      - run: go build -tags webkit2_41 ./...
