name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          wails build -ldflags "-X main.Version=$tag"

      - name: Stage release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build/bin/konnekt.exe dist/konnekt-windows-amd64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: konnekt-windows-amd64
          path: dist/konnekt-windows-amd64.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    container: ubuntu:22.04
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      # actions/checkout needs git; everything else here is the toolchain wails
      # build needs (webkit2gtk-4.1 pins the glibc 2.35 / libsoup3 floor this
      # binary targets — see agent_docs/CLAUDE.md's Rocky Linux 10 build note).
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git ca-certificates curl build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: |
          tag="${{ github.ref_name }}"
          wails build -tags webkit2_41 -ldflags "-X main.Version=$tag"

      - name: Stage release asset
        run: |
          mkdir -p dist
          cp build/bin/konnekt dist/konnekt-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: konnekt-linux-amd64
          path: dist/konnekt-linux-amd64
          if-no-files-found: error

  package-rpm:
    needs: build-linux
    runs-on: ubuntu-latest
    container: rockylinux/rockylinux:10
    steps:
      - name: Install packaging dependencies
        run: dnf install -y git rpm-build rpmdevtools

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: konnekt-linux-amd64
          path: dist

      - name: Build RPM
        run: |
          # RPM Version can't contain "-"; "~" is the correct idiom for
          # pre-release tags too (it sorts *before* the base version), so
          # v2.0-alpha becomes 2.0~alpha, not a lossy substitution.
          tag="${{ github.ref_name }}"
          version="${tag#v}"
          version="${version//-/~}"

          rpmdev-setuptree
          cp dist/konnekt-linux-amd64 build/appicon.png build/linux/konnekt.desktop ~/rpmbuild/SOURCES/
          rpmbuild -bb build/linux/konnekt.spec --define "_version $version"

          mkdir -p dist-rpm
          cp ~/rpmbuild/RPMS/x86_64/*.rpm dist-rpm/

      - uses: actions/upload-artifact@v4
        with:
          name: konnekt-rpm
          path: dist-rpm/*.rpm
          if-no-files-found: error

  publish:
    needs: [build-windows, build-linux, package-rpm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: konnekt-*
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Publish release
        working-directory: dist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" * \
            --title "${{ github.ref_name }}" --generate-notes \
            --repo "${{ github.repository }}"
