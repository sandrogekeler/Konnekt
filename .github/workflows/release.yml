name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          wails build -ldflags "-X main.Version=$tag"

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build/bin/konnekt.exe dist/konnekt-windows-amd64.exe
          (Get-FileHash dist/konnekt-windows-amd64.exe -Algorithm SHA256).Hash.ToLower() + "  konnekt-windows-amd64.exe" | Out-File -Encoding ascii dist/checksums.txt

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/konnekt-windows-amd64.exe dist/checksums.txt --title "${{ github.ref_name }}" --generate-notes
